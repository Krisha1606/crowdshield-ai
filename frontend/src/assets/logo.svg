<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Primary Blue Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <!-- Secondary Cyan/Teal Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
  </defs>

  <!-- High-Tech Shield Outline -->
  <path d="M50 8 C68 8 78 18 78 36 C78 60 50 82 50 82 C50 82 22 60 22 36 C22 18 32 8 50 8 Z" 
        fill="none" 
        stroke="url(#shieldGrad)" 
        stroke-width="3" 
        stroke-linejoin="round" />

  <!-- Shield Internal Fill (Subtle Slate Glow) -->
  <path d="M50 11 C66 11 75 20 75 36 C75 57 50 78 50 78 C50 78 25 57 25 36 C25 20 34 11 50 11 Z" 
        fill="rgba(37, 99, 235, 0.08)" />

  <!-- AI Circuit Lines & Crowd Nodes -->
  <!-- Center hub node -->
  <circle cx="50" cy="42" r="6" fill="url(#shieldGrad)" />
  <circle cx="50" cy="42" r="9" fill="none" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Top-left node -->
  <circle cx="38" cy="30" r="4.5" fill="url(#glowGrad)" />
  <line x1="50" y1="42" x2="38" y2="30" stroke="#06B6D4" stroke-width="1.8" />

  <!-- Top-right node -->
  <circle cx="62" cy="30" r="4.5" fill="url(#glowGrad)" />
  <line x1="50" y1="42" x2="62" y2="30" stroke="#06B6D4" stroke-width="1.8" />

  <!-- Bottom-left node -->
  <circle cx="38" cy="54" r="4.5" fill="url(#glowGrad)" />
  <line x1="50" y1="42" x2="38" y2="54" stroke="#06B6D4" stroke-width="1.8" />

  <!-- Bottom-right node -->
  <circle cx="62" cy="54" r="4.5" fill="url(#glowGrad)" />
  <line x1="50" y1="42" x2="62" y2="54" stroke="#06B6D4" stroke-width="1.8" />

  <!-- Vertical axis connecting line representing stability -->
  <line x1="50" y1="22" x2="50" y2="62" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="2,2" />
  
  <!-- Outer Circuit Nodes for AI look -->
  <circle cx="50" cy="22" r="3" fill="#2563EB" />
  <circle cx="50" cy="62" r="3" fill="#2563EB" />
  
  <!-- Sleek glowing orbit ring -->
  <circle cx="50" cy="42" r="22" fill="none" stroke="rgba(6, 182, 212, 0.2)" stroke-width="1" />
</svg>
